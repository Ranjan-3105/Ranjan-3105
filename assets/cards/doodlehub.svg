<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 130" width="380" height="130">
  <defs>
    <linearGradient id="shine-doodlehub" x1="-40%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563eb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
      <animate attributeName="x1" values="-40%;140%" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0%;180%" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="bar-doodlehub" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <style>
      .card-bg { fill: #ffffff; }
      .title { font: 700 18px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #1f2937; }
      .stack { font: 500 12.5px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #6b7280; }
      .cta { font: 700 12px 'Segoe UI', Helvetica, Arial, sans-serif; fill: #2563eb; }
      .card-group {
        animation: floatIn 0.8s ease-out;
      }
      @keyframes floatIn {
        0% { opacity: 0; transform: translateY(6px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <g class="card-group">
    <rect class="card-bg" x="1" y="1" width="378" height="128" rx="14" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="1" y="1" width="378" height="128" rx="14" fill="none" stroke="url(#shine-doodlehub)" stroke-width="2"/>
    <rect x="0" y="0" width="6" height="130" rx="3" fill="url(#bar-doodlehub)"/>

    <text x="30" y="42" class="title">DoodleHub</text>
    <text x="30" y="64" class="stack">Next.js · WebSockets · Prisma</text>

    <g>
      <rect x="30" y="86" width="88" height="26" rx="13" fill="#2563eb" fill-opacity="0.1"/>
      <text x="45" y="103" class="cta">View repo →</text>
    </g>
  </g>
</svg>
